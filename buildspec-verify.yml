version: 0.2

env:
  variables:
    AWS_REGION: "us-east-1"

phases:
  pre_build:
    commands:
      - EC2_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=cicd-server" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].PublicIpAddress" --output text --region $AWS_REGION)
      - echo Verifying health at http://$EC2_IP/health
      - sleep 15

  build:
    commands:
      - HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" http://$EC2_IP/health)
      - echo HTTP status code $HTTP_CODE
      - cat /tmp/health_response.json
      - |
        if [ "$HTTP_CODE" != "200" ]; then
          echo "VERIFY FAILED — expected HTTP 200, got $HTTP_CODE"
          exit 1
        fi
      - STATUS=$(cat /tmp/health_response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
      - SERVICE=$(cat /tmp/health_response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('service',''))")
      - |
        if [ "$STATUS" != "ok" ] || [ "$SERVICE" != "cicd-backend" ]; then
          echo "VERIFY FAILED — unexpected response body: status=$STATUS service=$SERVICE"
          exit 1
        fi
      - echo "VERIFY PASSED — /health returned HTTP 200 with correct body"
